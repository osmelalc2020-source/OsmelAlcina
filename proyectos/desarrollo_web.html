<style>

/* Fondo oscuro del Modal */
.modal {
  display: none; 
  position: fixed; 
  z-index: 1000; 
  left: 0;
  top: 0;
  width: 100%; 
  height: 100%; 
  background-color: rgba(0, 0, 0, 0.9);
  cursor: pointer;
}

/* Imagen dentro del modal */
.modal-contenido {
  margin: auto;
  margin-top: 100px;
  display: block;
  max-width: 90%;
  max-height: 90%;
  animation: zoom 0.4s;
}

/* Animación al abrir */
@keyframes zoom {
  from {transform: scale(0)} 
  to {transform: scale(1)}
}

/* Botón de cerrar */
.cerrar {
  position: absolute;
  top: 15px;
  right: 35px;
  color: #f1f1f1;
  font-size: 50px;
  font-weight: bold;
  cursor: pointer;
}

/* Controles de Zoom posicionados arriba al centro */
.controles-zoom {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1010;
  display: flex;
  gap: 10px;
}

.controles-zoom button {
  background: rgba(240, 110, 4, 0.2);
  color: white;
  border: 1px solid white;
  padding: 8px 15px;
  cursor: pointer;
  border-radius: 5px;
  font-size: 14px;
  transition: 0.2s;
}

.controles-zoom button:hover {
  background: white;
  color: black;
}

/* Contenedor que maneja el scroll si la imagen se hace muy grande */
.contenedor-img {
  
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: flex-start; /* Cambiado de center a flex-start para acompañar el zoom superior */
  overflow: auto;


}

/* Imagen con transición suave para el zoom */
.modal-contenido {
  max-width: 80%;
  max-height: 80%;
  margin-top: 80px; /* Espacio opcional para que no tape los botones de zoom */
  transition: transform 0.2s ease-out;
  transform-origin: top center; /* El zoom se hace desde el centro */

}

</style>
    
    

    
<script>

let escalaActual = 1; // Escala inicial (1 = 100%)

function abrirModal(src) {
  restablecerZoom(); // Reinicia el zoom al abrir una nueva imagen
  document.getElementById("modalZoom").style.display = "block";
  document.getElementById("imgAmpliada").src = src;
}

function cerrarModal() {
  document.getElementById("modalZoom").style.display = "none";
}

// Función para acercar o alejar
function cambiarZoom(factor) {
  escalaActual += factor;
  
  // Limites para que no se achique demasiado ni se pixele al infinito
  if (escalaActual < 1) escalaActual = 1; 
  if (escalaActual > 7) escalaActual = 7; 

  aplicarTransformacion();
}

// Devuelve la imagen a su tamaño original
function restablecerZoom() {
  escalaActual = 1;
  aplicarTransformacion();
}

// Aplica el cambio visual en la imagen
function aplicarTransformacion() {
  const img = document.getElementById("imgAmpliada");
  img.style.transform = `scale(${escalaActual})`;
}



</script>



    
</head>
